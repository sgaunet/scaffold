name: Release
on:
  push:
    tags: ['v*']
permissions:
  contents: write
  packages: write
jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: jdx/mise-action@v4
        with:
          install: true
          cache: true

      - run: task release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
