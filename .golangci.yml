version: "2"

# Strategy: enable everything, then disable the opinionated, style-only, or
# domain-inappropriate linters (this is a file-generating CLI, so gosec's file
# checks and errcheck-on-fmt are noise). The high-value correctness linters
# (govet, staticcheck, unused, ineffassign, errorlint, revive, ...) stay on.
linters:
  default: all
  disable:
    - cyclop
    - depguard
    - err113
    - errcheck
    - exhaustruct
    - funlen
    - gochecknoglobals
    - gocognit
    - gocritic
    - gocyclo
    - goconst
    - gosec
    - ireturn
    - lll
    - mnd
    - modernize
    - musttag
    - nestif
    - nilerr
    - nlreturn
    - noinlineerr
    - nonamedreturns
    - paralleltest
    - varnamelen
    - wrapcheck
    - wsl
    - wsl_v5
    - gomodguard

formatters:
  enable:
    - gofmt
    - goimports
