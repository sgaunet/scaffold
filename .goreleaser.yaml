version: 2

project_name: scaffold

before:
  hooks:
    - go mod tidy

builds:
  - id: scaffold
    main: ./cmd/scaffold
    binary: scaffold
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X github.com/sgaunet/scaffold/internal/cli.Version={{ .Version }}
      - -X github.com/sgaunet/scaffold/internal/cli.Commit={{ .Commit }}
      - -X github.com/sgaunet/scaffold/internal/cli.Date={{ .Date }}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    mod_timestamp: "{{ .CommitTimestamp }}"

archives:
  - formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: "checksums.txt"

sboms:
  - artifacts: archive

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

