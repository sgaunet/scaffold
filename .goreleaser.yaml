version: 2

project_name: scaffold

before:
  hooks:
    - go mod tidy

builds:
  - id: scaffold
    main: ./cmd/scaffold
    binary: scaffold
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X github.com/sgaunet/scaffold/internal/cli.Version={{ .Version }}
      - -X github.com/sgaunet/scaffold/internal/cli.Commit={{ .Commit }}
      - -X github.com/sgaunet/scaffold/internal/cli.Date={{ .Date }}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    mod_timestamp: "{{ .CommitTimestamp }}"

archives:
  - formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: "checksums.txt"

sboms:
  - artifacts: archive

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"


homebrew_casks:
  - name: scaffold
    homepage: "https://github.com/sgaunet/scaffold"
    description: "scaffold"
    binaries:
      - scaffold
    generate_completions_from_executable:
      args:
        - completion
      shell_parameter_format: cobra
      shells:
        - bash
        - zsh
        - fish
    # Unsigned binaries are quarantined by macOS Gatekeeper; strip the attribute.
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}"]
          end
    commit_author:
      name: sgaunet
      email: sgaunet@users.noreply.github.com
    repository:
      owner: sgaunet
      name: homebrew-tools
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"

